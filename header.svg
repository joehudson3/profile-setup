<svg viewBox="0 0 840 240" xmlns="http://www.w3.org/2000/svg">
<defs><style>
@keyframes tw{0%,100%{opacity:.2}50%{opacity:.9}}
@keyframes tw2{0%,100%{opacity:.65}50%{opacity:.08}}
@keyframes a1{from{transform:translate(880px,55px) rotate(0deg)}to{transform:translate(-80px,165px) rotate(540deg)}}
@keyframes a2{from{transform:translate(-80px,85px) rotate(0deg)}to{transform:translate(880px,45px) rotate(-420deg)}}
@keyframes a3{from{transform:translate(460px,-60px) rotate(20deg)}to{transform:translate(280px,300px) rotate(380deg)}}
@keyframes a4{from{transform:translate(880px,185px) rotate(10deg)}to{transform:translate(-80px,95px) rotate(-360deg)}}
@keyframes a5{from{transform:translate(240px,300px) rotate(0deg)}to{transform:translate(580px,-60px) rotate(480deg)}}
@keyframes a6{from{transform:translate(-80px,155px) rotate(30deg)}to{transform:translate(880px,55px) rotate(660deg)}}
@keyframes sp{0%{transform:translate(152px,116px) rotate(-18deg)}20%{transform:translate(160px,106px) rotate(12deg)}40%{transform:translate(148px,128px) rotate(-8deg)}60%{transform:translate(157px,112px) rotate(22deg)}80%{transform:translate(143px,120px) rotate(-28deg)}100%{transform:translate(152px,116px) rotate(-18deg)}}
@keyframes ex{0%{opacity:1}15%{opacity:0}30%{opacity:1}45%{opacity:0}60%{opacity:1}75%{opacity:0}90%{opacity:1}100%{opacity:0}}
@keyframes b1{0%{transform:translate(157px,96px);opacity:1}80%{opacity:.9}100%{transform:translate(195px,-15px);opacity:0}}
@keyframes b2{0%{transform:translate(157px,96px);opacity:1}80%{opacity:.9}100%{transform:translate(855px,18px);opacity:0}}
@keyframes b3{0%{transform:translate(153px,98px);opacity:1}80%{opacity:.9}100%{transform:translate(55px,-18px);opacity:0}}
@keyframes fl{0%,92%,94.5%,97.5%,100%{opacity:1}93%{opacity:.2}95%{opacity:.75}98%{opacity:.3}}
.a1{animation:a1 20s linear infinite}
.a2{animation:a2 26s linear infinite;animation-delay:-9s}
.a3{animation:a3 16s linear infinite;animation-delay:-5s}
.a4{animation:a4 22s linear infinite;animation-delay:-14s}
.a5{animation:a5 18s linear infinite;animation-delay:-3s}
.a6{animation:a6 24s linear infinite;animation-delay:-11s}
.ship{animation:sp 9s ease-in-out infinite}
.ex{animation:ex .22s step-end infinite}
.b1{animation:b1 1.3s linear infinite}
.b2{animation:b2 2.9s linear infinite;animation-delay:-1.2s}
.b3{animation:b3 1.9s linear infinite;animation-delay:-2.4s}
.ttl{animation:fl 11s step-end infinite}
.s1{animation:tw 3s infinite}.s2{animation:tw 5.2s infinite;animation-delay:-2.1s}
.s3{animation:tw2 4.1s infinite;animation-delay:-1.1s}.s4{animation:tw2 3.6s infinite}
.s5{animation:tw 3.9s infinite;animation-delay:-.5s}.s6{animation:tw2 5s infinite;animation-delay:-1.5s}
.s7{animation:tw 3.4s infinite;animation-delay:-2.5s}.s8{animation:tw2 4.5s infinite}
.s9{animation:tw 4.3s infinite;animation-delay:-.7s}.s10{animation:tw2 3.1s infinite}
.s11{animation:tw 5.1s infinite;animation-delay:-3s}.s12{animation:tw2 3.9s infinite;animation-delay:-1.3s}
.s13{animation:tw 4.1s infinite;animation-delay:-1s}.s14{animation:tw2 3s infinite;animation-delay:-.9s}
.s15{animation:tw 4.9s infinite;animation-delay:-1.9s}
</style></defs>

<!-- Background -->
<rect width="840" height="240" fill="#07070f"/>

<!-- Stars -->
<circle class="s1" cx="42" cy="17" r="1" fill="white" opacity=".45"/>
<circle cx="108" cy="40" r=".8" fill="white" opacity=".5"/>
<circle class="s3" cx="192" cy="11" r="1.1" fill="white" opacity=".38"/>
<circle cx="272" cy="56" r=".7" fill="white" opacity=".42"/>
<circle class="s2" cx="338" cy="21" r="1" fill="white" opacity=".5"/>
<circle class="s4" cx="412" cy="7" r=".8" fill="white" opacity=".3"/>
<circle cx="492" cy="46" r="1.1" fill="white" opacity=".48"/>
<circle class="s5" cx="568" cy="16" r=".7" fill="white" opacity=".36"/>
<circle cx="642" cy="36" r="1" fill="white" opacity=".42"/>
<circle class="s6" cx="712" cy="13" r=".8" fill="white" opacity=".5"/>
<circle cx="792" cy="50" r="1.2" fill="white" opacity=".36"/>
<circle class="s7" cx="72" cy="174" r=".8" fill="white" opacity=".42"/>
<circle class="s8" cx="286" cy="186" r="1" fill="white" opacity=".46"/>
<circle cx="452" cy="196" r=".7" fill="white" opacity=".3"/>
<circle class="s13" cx="592" cy="176" r=".9" fill="white" opacity=".42"/>
<circle class="s14" cx="742" cy="192" r="1" fill="white" opacity=".46"/>
<circle cx="812" cy="166" r=".8" fill="white" opacity=".36"/>
<circle class="s11" cx="162" cy="216" r="1.1" fill="white" opacity=".42"/>
<circle class="s12" cx="372" cy="210" r=".7" fill="white" opacity=".3"/>
<circle cx="692" cy="220" r=".9" fill="white" opacity=".46"/>
<circle class="s9" cx="818" cy="28" r="1" fill="white" opacity=".36"/>
<circle cx="28" cy="98" r=".8" fill="white" opacity=".42"/>
<circle class="s10" cx="828" cy="128" r=".7" fill="white" opacity=".36"/>
<circle cx="550" cy="232" r="1" fill="white" opacity=".3"/>
<circle class="s15" cx="120" cy="200" r=".8" fill="white" opacity=".42"/>
<circle cx="480" cy="228" r=".6" fill="white" opacity=".25"/>
<circle cx="310" cy="8" r=".9" fill="white" opacity=".38"/>
<circle cx="730" cy="230" r=".7" fill="white" opacity=".3"/>

<!-- Asteroids -->
<g class="a1"><polygon fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round" points="0,-28 19,-14 25,6 17,26 -3,30 -21,19 -27,-4 -17,-24"/></g>
<g class="a2"><polygon fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round" points="0,-18 13,-8 17,8 7,18 -7,16 -18,4 -13,-14"/></g>
<g class="a3"><polygon fill="none" stroke="white" stroke-width="1.4" stroke-linejoin="round" points="0,-10 7,-4 10,7 2,12 -7,9 -11,-2 -6,-9"/></g>
<g class="a4"><polygon fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round" points="0,-22 15,-10 21,3 15,19 -2,23 -17,15 -23,0 -15,-19"/></g>
<g class="a5"><polygon fill="none" stroke="white" stroke-width="1.4" stroke-linejoin="round" points="0,-13 9,-4 12,8 3,14 -8,11 -13,1 -8,-11"/></g>
<g class="a6"><polygon fill="none" stroke="white" stroke-width="1.5" stroke-linejoin="round" points="0,-24 17,-12 23,5 15,22 -2,27 -18,16 -25,-2 -15,-21"/></g>

<!-- Ship (shapes centered at 0,0; group transform positions + rotates it) -->
<g class="ship">
  <polygon class="ex" fill="white" points="0,14 3.5,24 0,33 -3.5,24"/>
  <polygon fill="none" stroke="white" stroke-width="1.9" stroke-linejoin="round" points="0,-23 13,19 7,13 -7,13 -13,19"/>
</g>

<!-- Bullets -->
<rect class="b1" width="2.5" height="8" rx="1" x="-1.25" y="-4" fill="white"/>
<rect class="b2" width="2.5" height="8" rx="1" x="-1.25" y="-4" fill="white"/>
<rect class="b3" width="2.5" height="8" rx="1" x="-1.25" y="-4" fill="white"/>

<!-- Divider -->
<line x1="232" y1="26" x2="232" y2="214" stroke="rgba(255,255,255,0.14)" stroke-width="1"/>

<!-- HUD: score + wave -->
<text font-family="'Courier New',monospace" fill="rgba(255,255,255,0.32)" font-size="10" letter-spacing="2" x="22" y="27">SCORE</text>
<text font-family="'Courier New',monospace" fill="rgba(255,255,255,0.62)" font-size="10" letter-spacing="2" x="22" y="41">00089450</text>
<text font-family="'Courier New',monospace" fill="rgba(255,255,255,0.28)" font-size="9" letter-spacing="2" x="22" y="200">WAVE  04</text>
<text font-family="'Courier New',monospace" fill="rgba(255,255,255,0.5)" font-size="9" letter-spacing="2" x="22" y="213">HIGH 00241200</text>

<!-- HUD: lives (3 small ship icons) -->
<g transform="translate(176,20)"><polygon fill="none" stroke="rgba(255,255,255,0.44)" stroke-width="1.1" points="0,-6 4,5 2,2 -2,2 -4,5"/></g>
<g transform="translate(191,20)"><polygon fill="none" stroke="rgba(255,255,255,0.44)" stroke-width="1.1" points="0,-6 4,5 2,2 -2,2 -4,5"/></g>
<g transform="translate(206,20)"><polygon fill="none" stroke="rgba(255,255,255,0.44)" stroke-width="1.1" points="0,-6 4,5 2,2 -2,2 -4,5"/></g>

<!-- Main title -->
<text class="ttl" font-family="'Courier New',monospace" fill="white" font-size="33" font-weight="bold" letter-spacing="5" text-anchor="middle" x="536" y="109">IVAN J. HUDSON</text>

<!-- Subtitle -->
<text font-family="'Courier New',monospace" fill="rgba(255,255,255,0.55)" font-size="12" letter-spacing="3" text-anchor="middle" x="536" y="138">IT DIRECTOR · EDGE AI · ENTERPRISE ARCHITECT</text>

<!-- Second rule + tagline -->
<line x1="256" y1="160" x2="816" y2="160" stroke="rgba(255,255,255,0.1)" stroke-width="1"/>
<text font-family="'Courier New',monospace" fill="rgba(255,255,255,0.22)" font-size="9.5" letter-spacing="2.5" text-anchor="middle" x="536" y="182">30 YRS ENTERPRISE  ·  JETSON ORIN  ·  AZURE / AWS</text>

<!-- Bottom border -->
<line x1="0" y1="229" x2="840" y2="229" stroke="rgba(255,255,255,0.09)" stroke-width="1"/>
</svg>
